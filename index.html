<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워드업400 단어학습</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { height:100%; }
  body {
    font-family:"Segoe UI Emoji","Malgun Gothic","맑은 고딕",sans-serif;
    background:linear-gradient(160deg,#7dd8ff 0%,#c3f0ca 100%);
    min-height:100%;
    display:flex; justify-content:center;
    user-select:none;
  }
  .screen { display:none; width:100%; max-width:640px; padding:20px; text-align:center; margin:auto; }
  .screen.on { display:block; }

  h1 { font-size:2rem; color:#1a5276; margin-bottom:6px; }
  .sub { color:#2e6b8a; margin-bottom:22px; font-size:1.05rem; }

  .unit-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .unit-card {
    position:relative;
    background:#fff; border-radius:20px; padding:18px 12px;
    box-shadow:0 4px 10px rgba(0,0,0,.12); cursor:pointer;
    transition:transform .1s; border:3px solid transparent;
  }
  .unit-card:active { transform:scale(.96); }
  .unit-card .emo { font-size:2.2rem; }
  .unit-card .name { font-weight:bold; color:#333; margin-top:6px; font-size:1.15rem; }
  .unit-card .topic { color:#888; font-size:.9rem; margin-top:2px; }
  .unit-card .del {
    position:absolute; top:8px; right:8px; width:28px; height:28px;
    border:none; border-radius:50%; background:#f1f3f5; color:#999;
    font-size:.95rem; cursor:pointer; line-height:28px;
  }
  .unit-card .del:active { background:#ffe3e3; color:#e03131; }
  .unit-card.add-card {
    border:3px dashed #8fb8d8; background:#ffffffaa; color:#3b6fa0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:120px;
  }
  .unit-card.add-card .emo { font-size:2rem; }

  .home-actions { display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
  .home-actions button {
    font-family:inherit; background:#ffffffcc; border:none; border-radius:14px;
    padding:12px 18px; font-size:1rem; font-weight:bold; color:#456; cursor:pointer;
  }

  .mode-btns { display:flex; flex-direction:column; gap:16px; margin-top:10px; }
  button.big {
    font-family:inherit; font-size:1.4rem; font-weight:bold; color:#fff;
    border:none; border-radius:22px; padding:20px; cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.18); transition:transform .1s;
  }
  button.big:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.18); }
  .btn-learn { background:#ff9f43; }
  .btn-quiz  { background:#5f8bfd; }
  .btn-home  { background:#9aa5b1; }
  .btn-green { background:#2ecc71; }

  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .topbar .small-btn {
    font-family:inherit; background:#ffffffcc; border:none; border-radius:14px;
    padding:10px 16px; font-size:1rem; font-weight:bold; color:#456; cursor:pointer;
  }
  .progress-txt { font-weight:bold; color:#1a5276; font-size:1.1rem; }

  .stage {
    background:#fff; border-radius:28px; padding:34px 20px 28px;
    box-shadow:0 8px 20px rgba(0,0,0,.15); min-height:340px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .stage .emoji { font-size:6.5rem; line-height:1.1; }
  .stage .word  { font-size:3.2rem; font-weight:bold; color:#222; margin-top:10px; letter-spacing:2px; overflow-wrap:anywhere; }
  .stage .meaning { font-size:1.5rem; color:#e67e22; font-weight:bold; margin-top:8px; }

  .learn-controls { display:flex; gap:12px; justify-content:center; margin-top:18px; }
  .learn-controls button {
    font-family:inherit; font-size:1.5rem; border:none; border-radius:50%;
    width:64px; height:64px; cursor:pointer; background:#fff;
    box-shadow:0 4px 8px rgba(0,0,0,.15);
  }
  .learn-controls button:active { transform:scale(.92); }

  .bar { height:12px; background:#ffffff88; border-radius:6px; overflow:hidden; margin-top:16px; }
  .bar > div { height:100%; background:#ff9f43; width:0%; transition:width .4s; border-radius:6px; }

  /* 퀴즈 */
  .q-prompt { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .q-prompt .emoji { font-size:5rem; }
  .q-prompt .meaning { font-size:1.6rem; font-weight:bold; color:#e67e22; }
  .speak-btn {
    font-family:inherit; margin-top:6px; font-size:1.05rem; background:#eaf3ff; color:#3b6fd4;
    border:none; border-radius:14px; padding:10px 18px; cursor:pointer; font-weight:bold;
  }
  .slots, .tiles { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .slots { margin-top:22px; min-height:56px; }
  .tiles { margin-top:20px; min-height:56px; }
  .slot {
    width:48px; height:54px; border-bottom:5px solid #b8c4d0; border-radius:8px;
    font-size:2rem; font-weight:bold; color:#222;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    background:#f4f7fa;
  }
  .slot.filled { background:#fff3e0; border-bottom-color:#ff9f43; }
  .tile {
    width:48px; height:54px; border-radius:12px; background:#5f8bfd; color:#fff;
    font-size:1.9rem; font-weight:bold; display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 4px 0 #3d63c9;
  }
  .tile:active { transform:translateY(2px); box-shadow:0 2px 0 #3d63c9; }
  .tile.used { visibility:hidden; }
  .q-actions { display:flex; gap:12px; justify-content:center; margin-top:22px; }
  .q-actions button {
    font-family:inherit; border:none; border-radius:14px; padding:12px 20px;
    font-size:1.05rem; font-weight:bold; cursor:pointer;
  }
  .hint-btn { background:#fff3cd; color:#a07800; }
  .fb { margin-top:14px; font-size:1.4rem; font-weight:bold; min-height:34px; }
  .fb.good { color:#2ecc71; }
  .fb.bad  { color:#e74c3c; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .shake { animation:shake .35s; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }
  .pop { animation:pop .5s; }

  /* 검은 선 그림 */
  img.licon { width:1em; height:1em; vertical-align:-0.12em; }
  .credit { color:#ffffffbb; font-size:.75rem; margin-top:18px; }

  /* 결과 */
  .stars { font-size:3.4rem; margin:14px 0; }
  .score-line { font-size:1.4rem; color:#333; font-weight:bold; margin-bottom:6px; }
  .retry-list { color:#777; font-size:1.05rem; margin-bottom:20px; }

  /* 유닛 만들기 */
  .add-box { background:#fff; border-radius:24px; padding:24px 18px; box-shadow:0 8px 20px rgba(0,0,0,.15); text-align:left; }
  .add-box label { font-weight:bold; color:#1a5276; display:block; margin:14px 0 6px; }
  .add-box input[type=text], .add-box textarea {
    font-family:inherit; width:100%; border:2px solid #d0dce6; border-radius:12px;
    padding:12px; font-size:1.05rem; background:#f8fbfd;
  }
  .add-box textarea { min-height:180px; resize:vertical; }
  .add-hint { color:#888; font-size:.9rem; margin-top:6px; line-height:1.5; }
  .preview-list { margin-top:10px; }
  .preview-row {
    display:flex; align-items:center; gap:10px; background:#f8fbfd;
    border-radius:12px; padding:8px 10px; margin-bottom:8px;
  }
  .preview-row input.emo-in {
    width:58px; font-size:1.6rem; text-align:center; border:2px solid #d0dce6;
    border-radius:10px; background:#fff; padding:4px; font-family:inherit;
  }
  .preview-row .pw { font-weight:bold; font-size:1.1rem; color:#222; }
  .preview-row .pm { color:#e67e22; font-size:1rem; margin-left:auto; }
  .add-actions { display:flex; gap:12px; margin-top:18px; }
  .add-actions button { flex:1; }
  .parse-error { color:#e03131; font-size:.95rem; margin-top:8px; }

  /* 카드 인쇄 */
  .print-toolbar { display:flex; gap:12px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
  .print-toolbar button {
    font-family:inherit; font-size:1.1rem; font-weight:bold; color:#fff; background:#5f8bfd;
    border:none; border-radius:12px; padding:12px 22px; cursor:pointer;
  }
  .print-toolbar select {
    font-family:inherit; font-size:1.05rem; font-weight:bold; color:#456;
    border:2px solid #d0dce6; border-radius:12px; padding:10px 14px; background:#fff;
  }
  .print-toolbar .back { background:#9aa5b1; }
  .print-unit-title {
    font-size:1.4rem; font-weight:bold; color:#1a5276; margin:16px 0 10px; text-align:left;
  }
  .print-cards { display:grid; grid-template-columns:repeat(2,1fr); }
  .pcard {
    border:2px dashed #b8c4d0; padding:16px 8px; text-align:center; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:140px;
  }
  .pcard .emoji { font-size:2.6rem; }
  .pcard .word { font-size:1.6rem; font-weight:bold; color:#222; margin-top:4px; }
  .pcard .meaning { font-size:1rem; color:#e67e22; font-weight:bold; margin-top:2px; }
  .pcard .tag { font-size:.7rem; color:#aaa; margin-top:5px; }

  @media print {
    body { background:#fff; display:block; }
    .screen { display:none !important; }
    #scr-print { display:block !important; max-width:none; padding:0; }
    .print-toolbar { display:none; }
    .print-unit-section { page-break-after:always; }
    .pcard { min-height:58mm; }
  }
</style>
</head>
<body>

<!-- 홈: 유닛 선택 -->
<div class="screen on" id="scr-home">
  <h1>🌟 우리집 단어공부 🌟</h1>
  <div class="sub">공부할 유닛을 골라보세요!</div>
  <div class="unit-grid" id="unit-grid"></div>
  <div class="home-actions">
    <button onclick="openPrint()">🖨️ 단어 카드 인쇄</button>
    <button onclick="importUnit()">📥 공유 코드 입력</button>
    <button id="share-all-btn" onclick="shareAll()">📤 내 유닛 전부 공유</button>
    <button id="restore-btn" style="display:none" onclick="restoreBuiltin()">↩️ 지운 기본 유닛 되살리기</button>
    <button id="icon-style-btn" onclick="toggleIconStyle()">🎨 그림: 컬러</button>
  </div>
  <div class="credit">단어 그림: OpenMoji (CC BY-SA 4.0)</div>
</div>

<!-- 모드 선택 -->
<div class="screen" id="scr-mode">
  <h1 id="mode-title">Unit 9</h1>
  <div class="sub" id="mode-topic"></div>
  <div class="mode-btns">
    <button class="big btn-learn" onclick="startLearn()">📺 단어 배우기 (자동 재생)</button>
    <button class="big btn-quiz" onclick="startQuiz()">🧩 글자 맞추기 퀴즈</button>
    <button class="big btn-green" id="share-btn" style="display:none" onclick="shareUnit()">📤 친구에게 공유 (코드 복사)</button>
    <button class="big btn-home" onclick="goHome()">🏠 처음으로</button>
  </div>
</div>

<!-- 학습(자동재생) -->
<div class="screen" id="scr-learn">
  <div class="topbar">
    <button class="small-btn" onclick="stopLearn();show('scr-mode')">◀ 나가기</button>
    <div class="progress-txt" id="learn-prog">1 / 20</div>
  </div>
  <div class="stage">
    <div class="emoji" id="l-emoji">🍎</div>
    <div class="word" id="l-word">apple</div>
    <div class="meaning" id="l-meaning">사과</div>
  </div>
  <div class="bar"><div id="l-bar"></div></div>
  <div class="learn-controls">
    <button onclick="learnPrev()" title="이전">⏮️</button>
    <button onclick="togglePause()" id="pause-btn" title="일시정지">⏸️</button>
    <button onclick="learnNext()" title="다음">⏭️</button>
  </div>
</div>

<!-- 퀴즈 -->
<div class="screen" id="scr-quiz">
  <div class="topbar">
    <button class="small-btn" onclick="show('scr-mode')">◀ 나가기</button>
    <div class="progress-txt" id="quiz-prog">1 / 20</div>
  </div>
  <div class="stage" id="quiz-stage">
    <div class="q-prompt">
      <div class="emoji" id="q-emoji">🍎</div>
      <div class="meaning" id="q-meaning">사과</div>
      <button class="speak-btn" onclick="speakCurrentQuizWord()">🔊 발음 듣기</button>
    </div>
    <div class="slots" id="q-slots"></div>
    <div class="tiles" id="q-tiles"></div>
    <div class="fb" id="q-fb"></div>
    <div class="q-actions">
      <button class="hint-btn" onclick="useHint()">💡 힌트 (한 글자)</button>
    </div>
  </div>
</div>

<!-- 결과 -->
<div class="screen" id="scr-result">
  <div class="stage">
    <h1 id="r-title">참 잘했어요! 🎉</h1>
    <div class="stars" id="r-stars">⭐⭐⭐</div>
    <div class="score-line" id="r-score"></div>
    <div class="retry-list" id="r-retry"></div>
    <div class="mode-btns" style="width:100%">
      <button class="big btn-quiz" onclick="startQuiz()">🔁 다시 풀기</button>
      <button class="big btn-green" onclick="show('scr-mode')">✅ 유닛 화면으로</button>
    </div>
  </div>
</div>

<!-- 새 유닛 만들기 -->
<div class="screen" id="scr-add">
  <div class="topbar">
    <button class="small-btn" onclick="goHome()">◀ 취소</button>
    <div class="progress-txt">➕ 새 유닛 만들기</div>
  </div>
  <div class="add-box">
    <div id="add-step1">
      <label>유닛 이름</label>
      <input type="text" id="add-name" placeholder="예: 2학기 1단원, 과일 단어">
      <label>단어 목록 (한 줄에 하나씩)</label>
      <textarea id="add-words" placeholder="apple 사과&#10;banana 바나나&#10;ice cream 아이스크림"></textarea>
      <div class="add-hint">영어 단어를 먼저 쓰고, 한 칸 띄운 뒤 뜻을 써주세요.<br>엑셀이나 카톡에서 복사해서 붙여넣어도 돼요.</div>
      <div class="parse-error" id="add-error"></div>
      <div class="add-actions">
        <button class="big btn-home" onclick="document.getElementById('xlsx-file').click()">📂 엑셀 파일 불러오기</button>
        <button class="big btn-quiz" onclick="previewNewUnit()">다음 (그림 고르기) ➡️</button>
      </div>
      <input type="file" id="xlsx-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="loadExcel(this)">
    </div>
    <div id="add-step2" style="display:none">
      <label>그림 확인 — 마음에 안 들면 칸을 눌러서 바꿔주세요 (이모지 키보드 😊)</label>
      <div class="add-hint">🔤 표시는 맞는 그림을 못 찾은 단어예요 — 칸을 눌러 직접 넣어주세요.<br>공부 화면에서는 검은 선그림으로 바뀌어 나와요.</div>
      <div class="preview-list" id="add-preview"></div>
      <div class="add-actions">
        <button class="big btn-home" onclick="backToStep1()">◀ 뒤로</button>
        <button class="big btn-green" onclick="saveNewUnit()">💾 저장하기</button>
      </div>
    </div>
  </div>
</div>

<!-- 카드 인쇄 -->
<div class="screen" id="scr-print">
  <div class="print-toolbar">
    <button class="back" onclick="goHome()">◀ 돌아가기</button>
    <select id="print-select" onchange="renderPrint()"></select>
    <button onclick="window.print()">🖨️ 인쇄하기</button>
  </div>
  <div class="add-hint" style="text-align:center;margin-bottom:10px">인쇄한 뒤 점선을 따라 잘라 주세요. 유닛마다 새 페이지에서 시작돼요.</div>
  <div id="print-content"></div>
</div>

<script src="audio.js"></script>
<script src="xlsx.full.min.js"></script>
<script src="emoji-index.js"></script>

const OPENMOJI_LOCAL = "openmoji/";
const OPENMOJI_CDN = "https://cdn.jsdelivr.net/npm/openmoji@15.1.0/black/svg/";
function emojiCodes(e){ return [...e].map(c=>c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0")); }
function setIcon(el, emoji){
  if(ICON_STYLE === "color"){ el.textContent = emoji; return; }
  const codes = emojiCodes(emoji);
  const c1 = codes.filter(c=>c!=="FE0F").join("-");
  const c2 = codes.join("-");
  const tries = [OPENMOJI_LOCAL+c1, OPENMOJI_LOCAL+c2, OPENMOJI_CDN+c1, OPENMOJI_CDN+c2]
    .filter((v,i,a)=>a.indexOf(v)===i);
  el.textContent = "";
  const img = document.createElement("img");
  img.className = "licon";
  img.alt = "";
  let step = 0;
  img.onerror = ()=>{
    step++;
    if(step < tries.length) img.src = tries[step] + ".svg";
    else el.textContent = emoji;   // 전부 실패하면 이모지 그대로
  };
  img.src = tries[0] + ".svg";
  el.appendChild(img);
}

function suggestEmoji(word){
  // 붙인 것("citycenter") → 마지막 낱말부터 앞으로("center","city") 순서로 찾기
  const toks = word.toLowerCase().split(/\s+/).map(t=>t.replace(/[^a-z]/g,"")).filter(Boolean);
  const cands = [toks.join(""), ...toks.slice().reverse()];
  const keys = [];
  for(const k of cands){
    if(!k) continue;
    keys.push(k);
    // 변형: legs→leg, boxes→box, babies→baby, running→run
    if(k.endsWith("ies")) keys.push(k.slice(0,-3)+"y");
    else if(k.endsWith("es")) keys.push(k.slice(0,-2));
    if(k.endsWith("s")) keys.push(k.slice(0,-1));
    if(k.endsWith("ing")) keys.push(k.slice(0,-3));
  }
  const hexToEmoji = h => h.split("-").map(x=>String.fromCodePoint(parseInt(x,16))).join("");
  const lookup = k => {
    if(EMOJI_MAP[k]) return EMOJI_MAP[k];
    if(typeof EMOJI_INDEX !== "undefined" && EMOJI_INDEX[k]) return hexToEmoji(EMOJI_INDEX[k]);
    return null;
  };
  for(const k of keys){
    const hit = k && lookup(k);
    if(hit) return hit;
  }
  // 합성어 쪼개기: rainforest → forest, snowman → man 같은 뒷부분 찾기 (4글자 이상)
  const t = toks.join("");
  if(t.length >= 6){
    for(let i=1; i<=t.length-4; i++){
      const hit = lookup(t.slice(i));
      if(hit) return hit;
    }
  }
  return "🔤";   // 못 찾은 단어 표시 — 직접 골라달라는 뜻
}

function importUnit(){
  const code = prompt("친구에게 받은 공유 코드를 붙여넣어 주세요:");
  if(!code) return;
  try{
    const t = code.trim();
    let list;
    if(t.startsWith("WU1:")) list = [JSON.parse(decB64(t.slice(4)))];
    else if(t.startsWith("WU2:")) list = JSON.parse(decB64(t.slice(4)));
    else throw 0;
    if(!Array.isArray(list) || !list.length) throw 0;
    let n = 0;
    for(const data of list){
      if(!data.name || !Array.isArray(data.words)) continue;
      const words = data.words
        .filter(w=>Array.isArray(w) && w[0] && w[1])
        .map(w=>[String(w[0]), String(w[1]), String(w[2]||"⭐")]);
      if(!words.length) continue;
      CUSTOM["c" + Date.now() + "_" + n] = { name: String(data.name), emoji: "📗", words };
      n++;
    }
    if(!n) throw 0;
    saveCustom();
    renderHome();
    alert(`유닛 ${n}개를 받았어요! 🎉`);
  }catch(e){
    alert("코드를 읽지 못했어요. 복사가 잘 됐는지 확인하고 다시 붙여넣어 주세요.");
  }
}

function previewNewUnit(){
  const errEl = document.getElementById("add-error");
  errEl.textContent = "";
  const name = document.getElementById("add-name").value.trim();
  if(!name){ errEl.textContent = "유닛 이름을 적어주세요."; return; }
  const lines = document.getElementById("add-words").value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ errEl.textContent = "단어를 한 개 이상 적어주세요."; return; }
  const words = [], bad = [];
  for(const line of lines){
    const tokens = line.replace(/[,\t]/g," ").split(/\s+/).filter(Boolean);
    let en = [], rest = [];
    for(let i=0;i<tokens.length;i++){
      if(rest.length===0 && /^[a-zA-Z'\-]+$/.test(tokens[i])) en.push(tokens[i]);
      else rest.push(tokens[i]);
    }
    if(!en.length || !rest.length){ bad.push(line); continue; }
    const word = en.join(" ").toLowerCase();
    words.push([word, rest.join(" "), suggestEmoji(word)]);
  }
  if(bad.length){ errEl.textContent = "이 줄을 못 읽었어요 (영어 뜻 순서로 적어주세요): " + bad.join(" / "); return; }
  pendingWords = words;
  const list = document.getElementById("add-preview");
  list.innerHTML = "";
  words.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className = "preview-row";
    row.innerHTML = `<input class="emo-in" data-i="${i}" value="${w[2]}" maxlength="8">
                     <span class="pw">${escapeHtml(w[0])}</span><span class="pm">${escapeHtml(w[1])}</span>`;
    list.appendChild(row);
  });
  document.getElementById("add-step1").style.display = "none";
  document.getElementById("add-step2").style.display = "";
}
// 엑셀/CSV 파일 불러오기 (1열: 영어, 2열: 뜻)
function loadExcel(input){
  const file = input.files && input.files[0];
  input.value = "";
  if(!file) return;
  const errEl = document.getElementById("add-error");
  errEl.textContent = "";
  if(typeof XLSX === "undefined"){ errEl.textContent = "엑셀 읽기 기능을 불러오지 못했어요. 새로고침 후 다시 해보세요."; return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
      const lines = [];
      for(const r of rows){
        const en = String(r[0]==null?"":r[0]).trim();
        const ko = String(r[1]==null?"":r[1]).trim();
        if(!en || !ko) continue;
        if(!/[a-zA-Z]/.test(en)) continue;   // 제목 줄 등 영어가 아닌 줄은 건너뜀
        lines.push(en + " " + ko);
      }
      if(!lines.length){ errEl.textContent = "파일에서 단어를 못 찾았어요. 1열에 영어, 2열에 뜻이 있는지 확인해주세요."; return; }
      document.getElementById("add-words").value = lines.join("\n");
      const nameEl = document.getElementById("add-name");
      if(!nameEl.value.trim()) nameEl.value = file.name.replace(/\.(xlsx|xls|csv)$/i,"");
      errEl.textContent = "";
    }catch(err){
      errEl.textContent = "파일을 읽지 못했어요. 엑셀(.xlsx) 파일이 맞는지 확인해주세요.";
    }
  };
  reader.readAsArrayBuffer(file);
}

function saveNewUnit(){
  document.querySelectorAll("#add-preview .emo-in").forEach(inp=>{
    const v = inp.value.trim();
    if(v) pendingWords[+inp.dataset.i][2] = v;
  });
  const name = document.getElementById("add-name").value.trim();
  const id = "c" + Date.now();
  CUSTOM[id] = { name, emoji: "📗", words: pendingWords };
  saveCustom();
  goHome();
}

// ─── 말하기 (TTS) ───
let enVoice=null, koVoice=null;
function pickVoices(){
  const vs = speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang) && /google|natural|aria|jenny|zira/i.test(v.name))
         || vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
  koVoice = vs.find(v=>/ko/i.test(v.lang)) || null;
}
pickVoices();
speechSynthesis.onvoiceschanged = pickVoices;

function makeUtter(text, lang, rate){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = rate;
  const v = lang.startsWith("en") ? enVoice : koVoice;
  if(v) u.voice = v;
  return u;
}

// ─── 원어민 소리 (audio.js에 내장) + 없으면 기기 목소리 ───
let curAudio = null;
function stopAudio(){
  if(curAudio){ curAudio.onended=null; curAudio.pause(); curAudio=null; }
  speechSynthesis.cancel();
}
function playOne(key, lang, text, rate, cb){
  cb = cb || function(){};
  const data = (typeof AUDIO !== "undefined") ? AUDIO[key] : null;
  if(data){
    const a = new Audio(data);
    curAudio = a;
    a.onended = cb;
    a.onerror = ()=>cb();
    a.play().catch(()=>cb());
  } else {
    const u = makeUtter(text, lang==="en" ? "en-US" : "ko-KR", rate);
    u.onend = cb;
    u.onerror = ()=>cb();
    speechSynthesis.speak(u);
  }
}

// ─── 효과음 ───
let actx=null;
function tone(freq, dur, when=0, type="sine", vol=.25){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
  const t=actx.currentTime+when;
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t); o.stop(t+dur);
}
function dingSound(){ tone(660,.15); tone(880,.25,.13); }
function buzzSound(){ tone(180,.3,0,"square",.12); }
function winSound(){ tone(523,.15); tone(659,.15,.15); tone(784,.15,.3); tone(1047,.4,.45); }

// ─── 학습 모드 (자동재생) ───
let lIdx=0, lPaused=false, lToken=0;
function startLearn(){ lIdx=0; lPaused=false; show("scr-learn"); playCurrent(); }
function stopLearn(){ lToken++; stopAudio(); }
function renderLearn(){
  const w = U().words[lIdx];
  setIcon(document.getElementById("l-emoji"), w[2]);
  document.getElementById("l-word").textContent = w[0];
  document.getElementById("l-meaning").textContent = w[1];
  document.getElementById("learn-prog").textContent = (lIdx+1)+" / "+U().words.length;
  document.getElementById("l-bar").style.width = ((lIdx+1)/U().words.length*100)+"%";
  document.getElementById("pause-btn").textContent = lPaused ? "▶️" : "⏸️";
}
function playCurrent(){
  const token = ++lToken;
  stopAudio();
  renderLearn();
  const w = U().words[lIdx];
  const koTxt = w[1].replace(/[()]/g,"").split(",")[0].trim();
  // 영어 2번 → 한국어 뜻 1번 → 잠깐 쉬고 다음 단어
  const steps = [
    cb=>playOne("en:"+w[0], "en", w[0], 0.75, cb),
    cb=>playOne("en:"+w[0], "en", w[0], 0.85, cb),
    cb=>playOne("ko:"+curUnit+":"+lIdx, "ko", koTxt, 0.95, cb)
  ];
  let i = 0;
  function next(){
    if(token !== lToken || lPaused) return;
    if(i < steps.length){
      steps[i++](()=> setTimeout(next, 350));
    } else {
      setTimeout(()=>{
        if(token !== lToken || lPaused) return;
        if(lIdx < U().words.length-1){ lIdx++; playCurrent(); }
        else finishLearn();
      }, 900);
    }
  }
  setTimeout(next, 250);
}
function finishLearn(){
  winSound();
  document.getElementById("l-emoji").textContent = "🎉";
  document.getElementById("l-word").textContent = "다 봤어요!";
  document.getElementById("l-meaning").textContent = "이제 퀴즈로 확인해 볼까요?";
  setTimeout(()=>{ if(confirm("퀴즈를 풀러 갈까요?")) startQuiz(); else show("scr-mode"); }, 800);
}
function togglePause(){
  lPaused = !lPaused;
  document.getElementById("pause-btn").textContent = lPaused ? "▶️" : "⏸️";
  if(lPaused){ lToken++; stopAudio(); }
  else playCurrent();
}
function learnPrev(){ if(lIdx>0){ lIdx--; lPaused=false; playCurrent(); } }
function learnNext(){
  if(lIdx < U().words.length-1){ lIdx++; lPaused=false; playCurrent(); }
  else finishLearn();
}

// ─── 퀴즈 모드 (글자 배열) ───
let qIdx=0, qTiles=[], qSlots=[], qClean=true, qCorrect=0, qRetry=[], qAnswer="";
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}
function startQuiz(){
  qIdx=0; qCorrect=0; qRetry=[];
  show("scr-quiz");
  loadQuizWord();
}
function loadQuizWord(){
  stopAudio();
  const w = U().words[qIdx];
  qClean = true;
  qAnswer = w[0].replace(/\s+/g,"");  // 띄어쓰기는 퀴즈에서 뺌
  const letters = qAnswer.split("");
  let sh = shuffle(letters);
  if(letters.length>1 && sh.join("")===qAnswer) sh = shuffle(letters);
  qTiles = sh.map(ch=>({ch, used:false}));
  qSlots = new Array(letters.length).fill(null);
  setIcon(document.getElementById("q-emoji"), w[2]);
  document.getElementById("q-meaning").textContent = w[1];
  document.getElementById("quiz-prog").textContent = (qIdx+1)+" / "+U().words.length;
  setFb("","");
  renderQuiz();
  speakCurrentQuizWord();
}
function renderQuiz(){
  const slotsEl = document.getElementById("q-slots");
  const tilesEl = document.getElementById("q-tiles");
  slotsEl.innerHTML = ""; tilesEl.innerHTML = "";
  qSlots.forEach((ti, si)=>{
    const d = document.createElement("div");
    d.className = "slot" + (ti!==null ? " filled" : "");
    d.textContent = ti!==null ? qTiles[ti].ch : "";
    d.onclick = ()=>{
      if(qSlots[si]!==null){ qTiles[qSlots[si]].used=false; qSlots[si]=null; renderQuiz(); }
    };
    slotsEl.appendChild(d);
  });
  qTiles.forEach((t, ti)=>{
    const d = document.createElement("div");
    d.className = "tile" + (t.used ? " used" : "");
    d.textContent = t.ch;
    d.onclick = ()=>{
      if(t.used) return;
      const si = qSlots.indexOf(null);
      if(si === -1) return;
      qSlots[si] = ti; t.used = true;
      tone(500+si*40,.08,0,"triangle",.12);
      renderQuiz();
      if(qSlots.indexOf(null) === -1) checkAnswer();
    };
    tilesEl.appendChild(d);
  });
}
function setFb(txt, cls){ const f=document.getElementById("q-fb"); f.textContent=txt; f.className="fb "+cls; }
function checkAnswer(){
  const w = U().words[qIdx];
  const made = qSlots.map(ti=>qTiles[ti].ch).join("");
  if(made === qAnswer){
    if(qClean) qCorrect++; else qRetry.push(w[0]);
    dingSound();
    setFb("딩동댕! " + w[0] + " 🎉", "good");
    document.getElementById("q-emoji").classList.add("pop");
    playOne("en:"+w[0], "en", w[0], 0.9);
    setTimeout(()=>{
      document.getElementById("q-emoji").classList.remove("pop");
      if(qIdx < U().words.length-1){ qIdx++; loadQuizWord(); }
      else showResult();
    }, 1400);
  } else {
    qClean = false;
    buzzSound();
    setFb("앗, 다시 한번! 💪", "bad");
    const st = document.getElementById("quiz-stage");
    st.classList.add("shake");
    setTimeout(()=>{
      st.classList.remove("shake");
      qSlots.forEach(ti=>{ if(ti!==null) qTiles[ti].used=false; });
      qSlots.fill(null);
      renderQuiz();
    }, 600);
  }
}
function useHint(){
  qClean = false;
  const si = qSlots.indexOf(null);
  if(si === -1) return;
  for(let s=0; s<qSlots.length; s++){
    if(qSlots[s]!==null && qTiles[qSlots[s]].ch !== qAnswer[s]){
      qTiles[qSlots[s]].used=false; qSlots[s]=null;
    }
  }
  const si2 = qSlots.indexOf(null);
  const need = qAnswer[si2];
  const ti = qTiles.findIndex(t=>!t.used && t.ch===need);
  if(ti !== -1){
    qSlots[si2]=ti; qTiles[ti].used=true;
    tone(700,.12,0,"triangle",.15);
    renderQuiz();
    if(qSlots.indexOf(null) === -1) checkAnswer();
  }
}
function speakCurrentQuizWord(){
  stopAudio();
  const w = U().words[qIdx];
  playOne("en:"+w[0], "en", w[0], 0.8);
}
function showResult(){
  const total = U().words.length;
  winSound();
  show("scr-result");
  const ratio = qCorrect/total;
  document.getElementById("r-title").textContent =
    ratio>=0.9 ? "우와, 최고예요! 🏆" : ratio>=0.6 ? "참 잘했어요! 🎉" : "잘했어요! 조금만 더 연습해요 💪";
  document.getElementById("r-stars").textContent = ratio>=0.9 ? "⭐⭐⭐" : ratio>=0.6 ? "⭐⭐" : "⭐";
  document.getElementById("r-score").textContent = `${total}개 중 ${qCorrect}개를 한 번에 맞혔어요!`;
  document.getElementById("r-retry").textContent =
    qRetry.length ? "다시 연습하면 좋은 단어: " + qRetry.join(", ") : "";
}

// ─── 카드 인쇄 ───
function openPrint(){
  const sel = document.getElementById("print-select");
  sel.innerHTML = '<option value="all">전체 유닛</option>';
  for(const u of Object.keys(BUILTIN)) if(!HIDDEN.has(u)) sel.innerHTML += `<option value="${u}">Unit ${u} ${BUILTIN[u].topic}</option>`;
  for(const id of Object.keys(CUSTOM)) sel.innerHTML += `<option value="${escapeHtml(id)}">${escapeHtml(CUSTOM[id].name)}</option>`;
  renderPrint();
  show("scr-print");
}
function renderPrint(){
  const pick = document.getElementById("print-select").value || "all";
  const root = document.getElementById("print-content");
  root.innerHTML = "";
  const entries = [];
  for(const u of Object.keys(BUILTIN)){
    if(HIDDEN.has(u)) continue;
    if(pick!=="all" && pick!==u) continue;
    entries.push([`Unit ${u} · ${BUILTIN[u].topic}`, BUILTIN[u].words, "Unit "+u]);
  }
  for(const id of Object.keys(CUSTOM)){
    if(pick!=="all" && pick!==id) continue;
    entries.push([CUSTOM[id].name, CUSTOM[id].words, CUSTOM[id].name]);
  }
  for(const [title, words, tag] of entries){
    const sec = document.createElement("div");
    sec.className = "print-unit-section";
    sec.innerHTML = `<div class="print-unit-title">${escapeHtml(title)}</div>`;
    const grid = document.createElement("div");
    grid.className = "print-cards";
    for(const [word, meaning, emoji] of words){
      const c = document.createElement("div");
      c.className = "pcard";
      c.innerHTML = `<div class="emoji"></div><div class="word">${escapeHtml(word)}</div>
                     <div class="meaning">${escapeHtml(meaning)}</div><div class="tag">${escapeHtml(tag)}</div>`;
      setIcon(c.querySelector(".emoji"), emoji);
      grid.appendChild(c);
    }
    sec.appendChild(grid);
    root.appendChild(sec);
  }
}

renderHome();
