<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초등 수학 학년별 체크리스트</title>
<style>
  :root {
    --ink:#1c2230; --sub:#68707e; --line:#e4e2dc; --paper:#faf9f6; --card:#ffffff;
    --accent:#22314f; --good:#1f7a5c; --bad:#b4432f;
    --g1:#a3542a; --g2:#b5651d; --g3:#8a7423; --g4:#1f7a5c; --g5:#2f4b8c; --g6:#7a2f5c;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { height:100%; }
  body {
    font-family:"Pretendard","Malgun Gothic","맑은 고딕",-apple-system,"Segoe UI Emoji",sans-serif;
    background:var(--paper); color:var(--ink);
    min-height:100%; display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:640px; padding:26px 18px 50px; }

  header { text-align:center; margin-bottom:26px; }
  h1 { font-size:1.5rem; font-weight:800; letter-spacing:-.02em; }
  .sub { color:var(--sub); font-size:.92rem; margin-top:6px; }

  nav.jump { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:16px; }
  nav.jump a {
    font-size:.82rem; font-weight:700; text-decoration:none; color:var(--ink);
    background:var(--card); border:1px solid var(--line); border-radius:8px; padding:6px 10px;
  }

  .recap {
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:26px;
  }
  .recap .rt { font-weight:800; font-size:.95rem; margin-bottom:8px; }
  .recap .rt .n { color:var(--bad); }
  .recap ul { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .recap li a {
    display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--ink);
    font-size:.85rem; font-weight:600;
  }
  .recap li .tag {
    font-size:.7rem; font-weight:800; color:#fff; background:var(--bad);
    border-radius:6px; padding:1px 6px; flex-shrink:0;
  }
  .recap .empty { color:var(--sub); font-size:.85rem; }

  .grade-block { margin-top:30px; }
  .grade-head {
    display:flex; align-items:center; gap:10px; padding-bottom:10px;
    border-bottom:2px solid var(--line); margin-bottom:14px;
  }
  .grade-head .badge {
    width:34px; height:34px; border-radius:9px; color:#fff; font-weight:800; font-size:.95rem;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .grade-head .ttl { font-size:1.08rem; font-weight:800; }
  .grade-head .prog { margin-left:auto; font-size:.8rem; font-weight:700; color:var(--sub); text-align:right; }
  .grade-head .prog .t2 { display:block; color:var(--bad); }

  .semester { margin-bottom:14px; }
  .semester-label { font-size:.8rem; font-weight:700; color:var(--sub); margin:10px 0 6px 2px; }

  .item {
    background:var(--card); border:1px solid var(--line); border-left:4px solid var(--line);
    border-radius:12px; padding:12px 12px; margin-bottom:8px;
  }
  .item.fail { border-left-color:var(--bad); }
  .item.pass { border-left-color:var(--good); }
  .item-top { display:flex; align-items:flex-start; gap:10px; cursor:pointer; }
  .item .num {
    width:24px; height:24px; border-radius:7px; background:var(--paper); border:1px solid var(--line);
    color:var(--sub); font-weight:800; font-size:.75rem; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .item.done .num { background:var(--accent); border-color:var(--accent); color:#fff; }
  .item input[type=checkbox] { width:19px; height:19px; margin-top:2px; flex-shrink:0; accent-color:var(--accent); }
  .item .body { flex:1; }
  .item .name { font-weight:700; font-size:.98rem; }
  .item .name .ic { margin-right:4px; }
  .item.done .name { color:var(--sub); text-decoration:line-through; }
  .item .desc { font-size:.83rem; color:var(--sub); margin-top:2px; line-height:1.4; }

  .quiz-toggle {
    font-family:inherit; margin-top:8px; font-size:.78rem; font-weight:700;
    background:var(--paper); color:var(--accent); border:1px solid var(--line);
    border-radius:8px; padding:6px 10px; cursor:pointer;
  }
  .quiz-box { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:none; }
  .quiz-box.open { display:block; }
  .quiz-box .q-label { font-size:.72rem; font-weight:800; color:var(--sub); margin-bottom:3px; }
  .quiz-box .q-text { font-size:.92rem; font-weight:600; line-height:1.5; }
  .quiz-box .ans-toggle {
    font-family:inherit; margin-top:8px; font-size:.78rem; font-weight:700;
    background:var(--accent); color:#fff; border:none; border-radius:8px; padding:6px 12px; cursor:pointer;
  }
  .quiz-box .q-ans {
    display:none; margin-top:8px; background:var(--paper); border-radius:8px; padding:8px 10px;
    font-size:.88rem; font-weight:600; color:var(--good);
  }
  .quiz-box .q-ans.open { display:block; }
  .quiz-box .q-feedback { display:none; gap:8px; margin-top:10px; }
  .quiz-box .q-feedback.open { display:flex; }
  .quiz-box .q-feedback button {
    font-family:inherit; flex:1; font-size:.82rem; font-weight:700; border-radius:8px;
    padding:8px; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--ink);
  }
  .quiz-box .q-feedback button.on-pass { background:var(--good); color:#fff; border-color:var(--good); }
  .quiz-box .q-feedback button.on-fail { background:var(--bad); color:#fff; border-color:var(--bad); }

  footer { display:flex; justify-content:center; gap:10px; margin-top:26px; flex-wrap:wrap; }
  footer button {
    font-family:inherit; background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:10px 16px; font-size:.85rem; font-weight:700; color:var(--ink); cursor:pointer;
  }
  footer button:active { transform:translateY(1px); }
  .credit { text-align:center; color:var(--sub); font-size:.72rem; margin-top:18px; }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink:#eef0f4; --sub:#9aa1ad; --line:#2c3140; --paper:#171a22; --card:#1f2330;
      --accent:#5b73b7; --good:#3fa984; --bad:#d9705a;
      --g1:#c97b4c; --g2:#d98a4e; --g3:#c2a94f; --g4:#3fa984; --g5:#7c93e0; --g6:#c96fa0;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>초등 수학 학년별 체크리스트</h1>
    <div class="sub">학년마다 꼭 익혀야 할 수학 단원을 확인하고, 예시문제로 아이 수준을 확인해보세요</div>
    <nav class="jump" id="jump"></nav>
  </header>

  <div class="recap" id="recap"></div>
  <div id="grades"></div>

  <footer>
    <button onclick="resetAll()">↩️ 전체 초기화</button>
  </footer>
  <div class="credit">2022 개정 교육과정 초등수학 단원 기준</div>
</div>

const KEY = "math_checklist_v1";
const TKEY = "math_test_v1";
let STATE = JSON.parse(localStorage.getItem(KEY) || "{}");
let TEST = JSON.parse(localStorage.getItem(TKEY) || "{}");
let OPEN = new Set();     // 예시문제가 펼쳐진 항목
let ANS_OPEN = new Set(); // 정답이 보이는 항목
function save(){ localStorage.setItem(KEY, JSON.stringify(STATE)); }
function saveTest(){ localStorage.setItem(TKEY, JSON.stringify(TEST)); }

function render(){
  const root = document.getElementById("grades");
  const jump = document.getElementById("jump");
  const recap = document.getElementById("recap");
  root.innerHTML = "";
  jump.innerHTML = "";

  const failList = [];

  for(const g of Object.keys(CURRICULUM).map(Number)){
    const data = CURRICULUM[g];
    const block = document.createElement("div");
    block.className = "grade-block";
    block.id = "grade-" + g;

    let total = 0, checked = 0, failCount = 0;
    const semHtml = [];
    data.semesters.forEach(sem=>{
      const rows = sem.units.map((u,i)=>{
        total++;
        const id = g + "-" + sem.label + "-" + i;
        const on = !!STATE[id];
        if(on) checked++;
        const result = TEST[id];
        if(result === "fail"){ failCount++; failList.push({id, g, label:`${g}학년 ${sem.label} · ${u[0]}`}); }
        return {id, no:i+1, name:u[0], desc:u[1], icon:u[2], q:u[3], a:u[4], on, result};
      });
      semHtml.push({label:sem.label, rows});
    });

    const head = document.createElement("div");
    head.className = "grade-head";
    head.innerHTML = `<span class="badge" style="background:${data.color}">${g}</span>
      <span class="ttl">초등 ${g}학년</span>
      <span class="prog">${checked} / ${total} 완료${failCount ? `<span class="t2">다시 확인 ${failCount}개</span>` : ""}</span>`;
    block.appendChild(head);

    semHtml.forEach(sem=>{
      const semDiv = document.createElement("div");
      semDiv.className = "semester";
      semDiv.innerHTML = `<div class="semester-label">${sem.label}</div>`;
      sem.rows.forEach(r=>{
        const row = document.createElement("div");
        row.className = "item" + (r.on ? " done" : "") + (r.result === "fail" ? " fail" : r.result === "pass" ? " pass" : "");
        row.id = "item-" + r.id;
        const qOpen = OPEN.has(r.id);
        const aOpen = ANS_OPEN.has(r.id);
        row.innerHTML = `
          <div class="item-top">
            <span class="num">${r.no}</span>
            <input type="checkbox" ${r.on ? "checked" : ""}>
            <span class="body">
              <div class="name"><span class="ic">${r.icon}</span>${escapeHtml(r.name)}</div>
              <div class="desc">${escapeHtml(r.desc)}</div>
            </span>
          </div>
          <button class="quiz-toggle">✏️ 예시문제로 확인하기</button>
          <div class="quiz-box ${qOpen ? "open" : ""}">
            <div class="q-label">예시문제</div>
            <div class="q-text">${escapeHtml(r.q)}</div>
            <button class="ans-toggle">정답 보기</button>
            <div class="q-ans ${aOpen ? "open" : ""}">정답: ${escapeHtml(r.a)}</div>
            <div class="q-feedback ${aOpen ? "open" : ""}">
              <button class="fb-btn ${r.result === "pass" ? "on-pass" : ""}" data-r="pass">😊 잘 풀었어요</button>
              <button class="fb-btn ${r.result === "fail" ? "on-fail" : ""}" data-r="fail">😥 어려워했어요</button>
            </div>
          </div>`;

        const cb = row.querySelector("input");
        const top = row.querySelector(".item-top");
        const toggleDone = ()=>{ STATE[r.id] = !STATE[r.id]; save(); render(); };
        top.onclick = (e)=>{ if(e.target !== cb) toggleDone(); };
        cb.onclick = (e)=>{ e.stopPropagation(); toggleDone(); };

        row.querySelector(".quiz-toggle").onclick = ()=>{
          if(OPEN.has(r.id)) OPEN.delete(r.id); else OPEN.add(r.id);
          render();
        };
        row.querySelector(".ans-toggle").onclick = ()=>{
          ANS_OPEN.add(r.id);
          render();
        };
        row.querySelectorAll(".fb-btn").forEach(btn=>{
          btn.onclick = ()=>{
            TEST[r.id] = TEST[r.id] === btn.dataset.r ? null : btn.dataset.r;
            if(!TEST[r.id]) delete TEST[r.id];
            saveTest();
            render();
          };
        });

        semDiv.appendChild(row);
      });
      block.appendChild(semDiv);
    });

    root.appendChild(block);

    const a = document.createElement("a");
    a.href = "#grade-" + g;
    a.textContent = g + "학년";
    jump.appendChild(a);
  }

  if(failList.length){
    recap.innerHTML = `<div class="rt">🔍 다시 확인이 필요해요 <span class="n">(${failList.length}개)</span></div>
      <ul>${failList.map(f=>`<li><a href="#item-${f.id}"><span class="tag">확인</span>${escapeHtml(f.label)}</a></li>`).join("")}</ul>`;
  } else {
    recap.innerHTML = `<div class="rt">🔍 다시 확인이 필요해요</div><div class="empty">예시문제를 풀어보면 아이가 어려워하는 단원이 여기에 모여요.</div>`;
  }
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function resetAll(){
  if(!confirm("체크 표시와 테스트 결과를 모두 지울까요?")) return;
  STATE = {}; TEST = {}; OPEN = new Set(); ANS_OPEN = new Set();
  save(); saveTest();
  render();
}

render();
</script>
